modules:
  confluence:contentBylineItem:
    - key: approval-byline
      title: WI Approval
      resource: main-frontend
      render: native
      resolver:
        function: resolver
      unlicensedAccess:
        - unlicensed

  confluence:globalSettings:
    - key: approval-settings
      title: WI Approval Settings
      resource: main-frontend
      render: native
      resolver:
        function: resolver

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main-frontend
    path: src/frontend/index.jsx # <-- IMPORTANT: Update this path to point to your actual React entry point (e.g., src/index.jsx)

permissions:
  scopes:
    - storage:app
    - read:confluence-content.all
    - read:page:confluence
    - read:confluence-user
    - read:space:confluence
    - read:content-details:confluence
    - read:jira-work
    - read:confluence-groups        # <-- add this
    - write:confluence-content      # <-- if the app writes approval status
    - read:confluence-props         # <-- if the app reads/writes content properties for approval status
  external:
    fetch:
      backend:
        - address: globe-api-staging-121809622543.asia-east1.run.app
  scopes: []
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/3ac02c43-e64a-4dd9-8470-8928bdf9435a
